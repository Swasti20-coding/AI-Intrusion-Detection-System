<!DOCTYPE html>
<html>
<head>
    <title>AI Intrusion Detection</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background: #f4f6f8;
        }
        h1 {
            color: #333;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
        pre {
            text-align: left;
            margin: 20px auto;
            width: 60%;
            background: #fff;
            padding: 10px;
            border-radius: 5px;
        }
        .attack { color: red; }
        .normal { color: green; }
    </style>
</head>

<body>

<h1>🔐 AI Intrusion Detection System</h1>

<button onclick="sendData()">Analyze Real Dataset Record</button>

<p id="result"></p>

<h3>Input Data Used:</h3>
<pre id="inputData"></pre>

<script>

// 🔥 PASTE YOUR sample.json HERE
const sampleData = {
  "duration": 0,
  "protocol_type": 1,
  "service": 20,
  "flag": 9,
  "src_bytes": 491,
  "dst_bytes": 0,
  "land": 0,
  "wrong_fragment": 0,
  "urgent": 0,
  "hot": 0,
  "num_failed_logins": 0,
  "logged_in": 1,
  "num_compromised": 0,
  "root_shell": 0,
  "su_attempted": 0,
  "num_root": 0,
  "num_file_creations": 0,
  "num_shells": 0,
  "num_access_files": 0,
  "num_outbound_cmds": 0,
  "is_host_login": 0,
  "is_guest_login": 0,
  "count": 2,
  "srv_count": 2,
  "serror_rate": 0,
  "srv_serror_rate": 0,
  "rerror_rate": 0,
  "srv_rerror_rate": 0,
  "same_srv_rate": 1,
  "diff_srv_rate": 0,
  "srv_diff_host_rate": 0,
  "dst_host_count": 150,
  "dst_host_srv_count": 25,
  "dst_host_same_srv_rate": 0.17,
  "dst_host_diff_srv_rate": 0.03,
  "dst_host_same_src_port_rate": 0.17,
  "dst_host_srv_diff_host_rate": 0,
  "dst_host_serror_rate": 0,
  "dst_host_srv_serror_rate": 0,
  "dst_host_rerror_rate": 0.05,
  "dst_host_srv_rerror_rate": 0,
  "difficulty": 0
};

function sendData() {
    document.getElementById("result").innerText = "Analyzing...";

    // show input used
    document.getElementById("inputData").innerText =
        JSON.stringify(sampleData, null, 2);

    fetch("http://127.0.0.1:8000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(sampleData)
    })
    .then(res => res.json())
    .then(data => {
        let result = document.getElementById("result");

        result.innerText = "Result: " + data.label.toUpperCase();

        if (data.label === "attack") {
            result.className = "attack";
        } else {
            result.className = "normal";
        }
    });
}
</script>

</body>
</html>
